# =============================================================================
# BrainFLORA Configuration File
# =============================================================================
# Main configuration for training multimodal neural encoders
# Supports EEG, MEG, and fMRI modalities

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
seed: 42
output_dir: ./outputs
project_name: "BrainFLORA"
experiment_name: "multimodal_encoder"
log_interval: 10  # logging frequency (steps)
save_checkpoints: True
save_interval: 5  # save checkpoint every N epochs

# Weights & Biases logging
wandb:
  enabled: True
  project: "BrainFLORA"
  entity: ""  # your wandb entity
  tags: ["multimodal", "neural-decoding"]

# -----------------------------------------------------------------------------
# Dataset Configuration
# -----------------------------------------------------------------------------
# Modify paths according to your dataset location

eegdataset:
  name: "THINGS-EEG"
  img_directory_training: ./data/THINGS_EEG/images_set/training_images
  img_directory_test: ./data/THINGS_EEG/images_set/test_images
  data_path: ./data/THINGS_EEG/preprocessed
  num_channels: 63
  seq_len: 250
  sampling_rate: 250
  val_ratio: 0.1

megdataset:
  name: "THINGS-MEG"
  img_directory_training: ./data/THINGS_MEG/images_set/training_images
  img_directory_test: ./data/THINGS_MEG/images_set/test_images
  data_path: ./data/THINGS_MEG/preprocessed
  num_channels: 222
  seq_len: 281
  sampling_rate: 1000
  val_ratio: 0.1

fmridataset:
  name: "THINGS-fMRI"
  img_directory_training: ./data/fmri_dataset/images/train_images
  img_directory_test: ./data/fmri_dataset/images/test_images
  data_path: ./data/fmri_dataset/preprocessed
  num_voxels: 1280
  val_ratio: 0.1

# -----------------------------------------------------------------------------
# Model Architecture
# -----------------------------------------------------------------------------
network:
  embed_dim: 1024
  num_blocks: 16
  num_heads: 8
  drop_path: 0.1
  use_modality_embedding: True
  token_postprocessing: "mean"  # "mean" or "max"
  weight_init_style: "pytorch"

# Modality-specific encoder configurations
hyperparameter:
  modalities: ['eeg', 'meg', 'fmri']  # active modalities for training
  modality_embed_dim: 1024
  cross_attention: True
  crossattn_dim_head: 64
  crossattn_heads: 8
  crossattn_modality_dropout: 0.1
  num_blocks: 1

  # Token sizes for each modality
  crossattn_latent:
    image: 16
    eeg: 1
    meg: 1
    fmri: 1

  # EEG encoder config
  eeg:
    input_dim: 63
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  # MEG encoder config
  meg:
    input_dim: 222
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  # fMRI encoder config
  fmri:
    input_dim: 8
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 1280
      embedding_dim: 1280
      proj_dim: 1024
      drop_proj: 0.5

# -----------------------------------------------------------------------------
# DataLoader Configuration
# -----------------------------------------------------------------------------
dataloader:
  batch_size: 256
  num_workers: 4
  pin_memory: True
  persistent_workers: True
  shuffle: True
  drop_last: False

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: False

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
optimizer:
  name: "AdamW"
  lr: 1.0e-5
  eps: 1.0e-7
  weight_decay: 1e-4

warmup:
  enabled: True
  lr: 1e-10
  steps: 1000

lr_scheduler:
  name: "CosineAnnealingLR"
  T_max: 500  # should match train.total_epochs
  eta_min: 1e-6

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
train:
  total_epochs: 500
  total_iters: 20000
  epoch_iters: 1000
  validation_iters: 100
  grad_clip: 1.0
  accum_iter: 1
  mixed_precision: True  # use AMP for faster training
  pretrained_dir: ""  # path to pretrained model for fine-tuning
