# =============================================================================
# BrainFLORA Configuration - Reranking Mode
# =============================================================================
# Configuration for visual retrieval with reranking

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
seed: 42
output_dir: ./outputs/rerank
project_name: "BrainFLORA"
experiment_name: "retrieval_rerank"
log_interval: 10
save_checkpoints: True
save_interval: 5

# Weights & Biases logging
wandb:
  enabled: True
  project: "BrainFLORA-Rerank"
  entity: ""
  tags: ["retrieval", "reranking"]

# -----------------------------------------------------------------------------
# Dataset Configuration (Reranking-specific paths)
# -----------------------------------------------------------------------------
eegdataset:
  name: "THINGS-EEG"
  img_directory_training: ./data/THINGS_EEG/images_set/training_images
  img_directory_test: ./data/THINGS_EEG/images_set/test_images
  data_path: ./data/THINGS_EEG/preprocessed
  num_channels: 63
  seq_len: 250
  sampling_rate: 250
  val_ratio: 0.1

megdataset:
  name: "THINGS-MEG"
  img_directory_training: ./data/THINGS_MEG/images_set_filter/training_images
  img_directory_test: ./data/THINGS_MEG/images_set_filter/test_images
  data_path: ./data/THINGS_MEG/preprocessed
  num_channels: 222
  seq_len: 281
  sampling_rate: 1000
  val_ratio: 0.1

fmridataset:
  name: "THINGS-fMRI"
  img_directory_training: ./data/fmri_dataset/images_rerank/train_images
  img_directory_test: ./data/fmri_dataset/images_rerank/test_images
  data_path: ./data/fmri_dataset/preprocessed
  num_voxels: 1280
  val_ratio: 0.1

# -----------------------------------------------------------------------------
# Model Architecture
# -----------------------------------------------------------------------------
network:
  embed_dim: 1024
  num_blocks: 16
  num_heads: 8
  drop_path: 0.1
  use_modality_embedding: True
  token_postprocessing: "mean"
  weight_init_style: "pytorch"

# Modality-specific encoder configurations
hyperparameter:
  modalities: ['eeg', 'meg', 'fmri']
  modality_embed_dim: 1024
  cross_attention: True
  crossattn_dim_head: 64
  crossattn_heads: 8
  crossattn_modality_dropout: 0.1
  num_blocks: 1

  crossattn_latent:
    image: 16
    eeg: 1
    meg: 1
    fmri: 1

  eeg:
    input_dim: 63
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  meg:
    input_dim: 222
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  fmri:
    input_dim: 8
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 1280
      embedding_dim: 1280
      proj_dim: 1024
      drop_proj: 0.5

# -----------------------------------------------------------------------------
# Reranking-specific Configuration
# -----------------------------------------------------------------------------
reranking:
  enabled: True
  top_k: 100  # number of candidates for reranking
  rerank_top_k: 10  # final top-k after reranking
  similarity_metric: "cosine"

# -----------------------------------------------------------------------------
# DataLoader Configuration
# -----------------------------------------------------------------------------
dataloader:
  batch_size: 256
  num_workers: 4
  pin_memory: True
  persistent_workers: True
  shuffle: True
  drop_last: False

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: False

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
optimizer:
  name: "AdamW"
  lr: 1.0e-5
  eps: 1.0e-7
  weight_decay: 1e-4

warmup:
  enabled: True
  lr: 1e-10
  steps: 1000

lr_scheduler:
  name: "CosineAnnealingLR"
  T_max: 500
  eta_min: 1e-6

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
train:
  total_epochs: 500
  total_iters: 20000
  epoch_iters: 1000
  validation_iters: 100
  grad_clip: 1.0
  accum_iter: 1
  mixed_precision: True
  pretrained_dir: ""
