# =============================================================================
# BrainFLORA Configuration - A100 GPU Optimized
# =============================================================================
# Optimized configuration for NVIDIA A100 GPUs with larger batch sizes
# and mixed precision training

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
seed: 42
output_dir: ./outputs/A100
project_name: "BrainFLORA"
experiment_name: "multimodal_encoder_A100"
log_interval: 10
save_checkpoints: True
save_interval: 5

# Weights & Biases logging
wandb:
  enabled: True
  project: "BrainFLORA"
  entity: ""
  tags: ["multimodal", "A100", "high-performance"]

# -----------------------------------------------------------------------------
# Dataset Configuration
# -----------------------------------------------------------------------------
eegdataset:
  name: "THINGS-EEG"
  img_directory_training: ./data/THINGS_EEG/images_set/training_images
  img_directory_test: ./data/THINGS_EEG/images_set/test_images
  data_path: ./data/THINGS_EEG/preprocessed
  num_channels: 63
  seq_len: 250
  sampling_rate: 250
  val_ratio: 0.1

megdataset:
  name: "THINGS-MEG"
  img_directory_training: ./data/THINGS_MEG/images_set/training_images
  img_directory_test: ./data/THINGS_MEG/images_set/test_images
  data_path: ./data/THINGS_MEG/preprocessed
  num_channels: 222
  seq_len: 281
  sampling_rate: 1000
  val_ratio: 0.1

fmridataset:
  name: "THINGS-fMRI"
  img_directory_training: ./data/fmri_dataset/images/train_images
  img_directory_test: ./data/fmri_dataset/images/test_images
  data_path: ./data/fmri_dataset/preprocessed
  num_voxels: 1280
  val_ratio: 0.1

# -----------------------------------------------------------------------------
# Model Architecture
# -----------------------------------------------------------------------------
network:
  embed_dim: 1024
  num_blocks: 16
  num_heads: 8
  drop_path: 0.1
  use_modality_embedding: True
  token_postprocessing: "mean"
  weight_init_style: "pytorch"

hyperparameter:
  modalities: ['eeg', 'meg', 'fmri']
  modality_embed_dim: 1024
  cross_attention: True
  crossattn_dim_head: 64
  crossattn_heads: 8
  crossattn_modality_dropout: 0.1
  num_blocks: 1

  crossattn_latent:
    image: 16
    eeg: 1
    meg: 1
    fmri: 1

  eeg:
    input_dim: 63
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  meg:
    input_dim: 222
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 40
      embedding_dim: 1440
      proj_dim: 1024
      drop_proj: 0.5

  fmri:
    input_dim: 8
    output_dim: 1024
    hidden_dims: [1024]
    proj_neuro:
      emb_size: 1280
      embedding_dim: 1280
      proj_dim: 1024
      drop_proj: 0.5

# -----------------------------------------------------------------------------
# DataLoader Configuration (A100 optimized - larger batch sizes)
# -----------------------------------------------------------------------------
dataloader:
  batch_size: 512  # larger batch size for A100
  num_workers: 8   # more workers for faster data loading
  pin_memory: True
  persistent_workers: True
  shuffle: True
  drop_last: False
  prefetch_factor: 4  # prefetch more batches

val_dataloader:
  batch_size: 512
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: True
  drop_last: False
  prefetch_factor: 4

# -----------------------------------------------------------------------------
# Optimizer Configuration (A100 optimized)
# -----------------------------------------------------------------------------
optimizer:
  name: "AdamW"
  lr: 2.0e-5  # slightly higher LR for larger batch
  eps: 1.0e-7
  weight_decay: 1e-4

warmup:
  enabled: True
  lr: 1e-10
  steps: 500  # shorter warmup with larger batch

lr_scheduler:
  name: "CosineAnnealingLR"
  T_max: 300  # fewer epochs needed with larger batch
  eta_min: 1e-6

# -----------------------------------------------------------------------------
# Training Configuration (A100 optimized)
# -----------------------------------------------------------------------------
train:
  total_epochs: 300  # fewer epochs with larger batch
  total_iters: 15000
  epoch_iters: 500
  validation_iters: 50
  grad_clip: 1.0
  accum_iter: 1  # no accumulation needed with large batch
  mixed_precision: True  # BF16 on A100
  compile_model: True  # use torch.compile for speedup
  pretrained_dir: ""

# A100-specific optimizations
hardware:
  gpu_type: "A100"
  memory_efficient_attention: True  # use flash attention
  channels_last: True  # memory format optimization
  cudnn_benchmark: True
